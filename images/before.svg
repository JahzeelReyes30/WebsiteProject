<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="beforeTitle">
  <title id="beforeTitle">Cluttered, dirty room before cleaning (placeholder illustration)</title>
  <rect width="400" height="300" fill="#f4ede2"/>
  <rect x="0" y="0" width="400" height="180" fill="#e8dcc8"/>
  <rect x="0" y="180" width="400" height="120" fill="#cdb896"/>

  <!-- window -->
  <rect x="290" y="30" width="80" height="70" fill="#b7c9c7" stroke="#8a9c9a" stroke-width="3"/>
  <line x1="330" y1="30" x2="330" y2="100" stroke="#8a9c9a" stroke-width="3"/>
  <line x1="290" y1="65" x2="370" y2="65" stroke="#8a9c9a" stroke-width="3"/>

  <!-- dust smudges -->
  <ellipse cx="80" cy="60" rx="40" ry="12" fill="#b8a988" opacity="0.6"/>
  <ellipse cx="200" cy="40" rx="55" ry="10" fill="#b8a988" opacity="0.4"/>

  <!-- scattered boxes / clutter -->
  <rect x="30" y="200" width="55" height="45" fill="#a9754a" transform="rotate(-8 57 222)"/>
  <rect x="100" y="215" width="45" height="60" fill="#c98b52" transform="rotate(6 122 245)"/>
  <rect x="250" y="210" width="60" height="40" fill="#9c6b3e" transform="rotate(-4 280 230)"/>

  <!-- crumpled clothes -->
  <path d="M170 260 q20 -25 45 -5 q15 15 -5 30 q-30 10 -40 -25 z" fill="#d9534f" opacity="0.85"/>
  <path d="M320 250 q15 -20 35 0 q10 15 -10 25 q-20 5 -25 -25 z" fill="#5b7fa6" opacity="0.85"/>

  <!-- trash bits -->
  <circle cx="200" cy="270" r="6" fill="#777"/>
  <circle cx="220" cy="280" r="4" fill="#777"/>
  <circle cx="60" cy="270" r="5" fill="#777"/>

  <!-- scribble lines suggesting mess/grime -->
  <path d="M20 130 q40 20 80 0 t80 0 t80 0 t80 0" stroke="#a9967a" stroke-width="4" fill="none" opacity="0.5"/>
</svg>
