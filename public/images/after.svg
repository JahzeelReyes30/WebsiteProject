<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="afterTitle">
  <title id="afterTitle">Spotless, organized room after cleaning (placeholder illustration)</title>
  <rect width="400" height="300" fill="#ffffff"/>
  <rect x="0" y="0" width="400" height="180" fill="#eaf6f4"/>
  <rect x="0" y="180" width="400" height="120" fill="#d7ece8"/>

  <!-- window, clean and bright -->
  <rect x="290" y="30" width="80" height="70" fill="#cfe9ff" stroke="#14a89a" stroke-width="3"/>
  <line x1="330" y1="30" x2="330" y2="100" stroke="#14a89a" stroke-width="3"/>
  <line x1="290" y1="65" x2="370" y2="65" stroke="#14a89a" stroke-width="3"/>

  <!-- neatly stacked boxes -->
  <rect x="35" y="215" width="50" height="35" fill="#14a89a" rx="3"/>
  <rect x="35" y="182" width="50" height="30" fill="#0f6b63" rx="3"/>

  <!-- folded item -->
  <rect x="260" y="225" width="70" height="25" fill="#5b7fa6" rx="4"/>
  <rect x="260" y="200" width="70" height="20" fill="#7fa0c4" rx="4"/>

  <!-- plant for a "cared for" touch -->
  <rect x="150" y="240" width="20" height="20" fill="#a9754a" rx="3"/>
  <path d="M160 240 q-15 -20 0 -40 q15 20 0 40" fill="#3f9d6b"/>
  <path d="M160 240 q15 -15 5 -35 q-15 10 -5 35" fill="#2f7c53"/>

  <!-- sparkle marks -->
  <g fill="#14a89a">
    <path d="M110 90 l4 10 l10 4 l-10 4 l-4 10 l-4 -10 l-10 -4 l10 -4 z"/>
    <path d="M330 140 l3 8 l8 3 l-8 3 l-3 8 l-3 -8 l-8 -3 l8 -3 z"/>
    <path d="M60 150 l3 7 l7 3 l-7 3 l-3 7 l-3 -7 l-7 -3 l7 -3 z"/>
  </g>

  <!-- clean floor line, sharp and tidy -->
  <line x1="0" y1="180" x2="400" y2="180" stroke="#14a89a" stroke-width="2" opacity="0.6"/>
</svg>
